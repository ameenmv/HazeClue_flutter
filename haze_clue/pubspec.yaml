name: haze clue
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.2.3
  fl_chart: ^1.2.0
  signalr_netcore: ^1.3.5
  health: ^13.3.1
  permission_handler: ^12.0.3
  flutter_riverpod: ^3.3.2
  dio: ^5.10.0
  shimmer: ^3.0.0
  pinput: ^6.0.2
  onnxruntime: ^1.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_native_splash:
  android: true
  ios: true
  color: "#FFFFFF"
  image: assets/images/logo-v2.png

  android_12:
    color: "#FFFFFF"
    image: assets/images/logo-v2.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo-v2.png"
  min_sdk_size: 21


flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/images/Intro.png
    - assets/images/Intro1.png
    - assets/images/Intro2.png
    - assets/images/logo-v2.png